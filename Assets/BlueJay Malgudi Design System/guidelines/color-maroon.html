<!-- @dsCard group="Colors" viewport="700x170" name="Primary — Malgudi Maroon" subtitle="The Earthen Villas crest. Brand = 600." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:22px; background:var(--bg-app); font-family:var(--font-sans); }
  .scale { display:flex; gap:0; border-radius:14px; overflow:hidden; box-shadow:var(--shadow-sm); }
  .sw { flex:1; height:96px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px 9px; }
  .n { font-size:10px; font-weight:600; }
  .h { font-size:9px; opacity:.8; font-family:var(--font-mono); }
  .cap { margin-top:12px; font-size:12px; color:var(--text-muted); }
</style></head>
<body>
<div class="scale">
  <div class="sw" style="background:var(--maroon-50);color:#8C2D33"><span class="n">50</span><span class="h">#FBF1F0</span></div>
  <div class="sw" style="background:var(--maroon-100);color:#8C2D33"><span class="n">100</span><span class="h">#F6DDDB</span></div>
  <div class="sw" style="background:var(--maroon-200);color:#73262C"><span class="n">200</span><span class="h">#EBBBB8</span></div>
  <div class="sw" style="background:var(--maroon-300);color:#3F171C"><span class="n">300</span><span class="h">#DB908C</span></div>
  <div class="sw" style="background:var(--maroon-400);color:#fff"><span class="n">400</span><span class="h">#C5615E</span></div>
  <div class="sw" style="background:var(--maroon-500);color:#fff"><span class="n">500</span><span class="h">#A8302F</span></div>
  <div class="sw" style="background:var(--maroon-600);color:#fff"><span class="n">600 ·brand</span><span class="h">#8C2D33</span></div>
  <div class="sw" style="background:var(--maroon-700);color:#fff"><span class="n">700</span><span class="h">#73262C</span></div>
  <div class="sw" style="background:var(--maroon-800);color:#fff"><span class="n">800</span><span class="h">#571F25</span></div>
  <div class="sw" style="background:var(--maroon-900);color:#fff"><span class="n">900</span><span class="h">#3F171C</span></div>
  <div class="sw" style="background:var(--maroon-950);color:#EBBBB8"><span class="n">950</span><span class="h">#2A0F13</span></div>
</div>
<div class="cap">Sampled from the logo crest (~#A8302F). 600 is the brand fill; 950 is the dark-mode canvas.</div>
</body></html>
