<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:24px; background:var(--bg-app); font-family:var(--font-sans); }
  .row { display:flex; gap:16px; }
  .panel { flex:1; height:150px; border-radius:18px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; border:1px solid var(--border-hairline); }
  .panel img { width:74px; height:auto; display:block; }
  .cap { font-size:10px; font-family:var(--font-mono); }
  .lock { font-family:var(--font-display); font-size:1.25rem; letter-spacing:-.01em; }
</style></head>
<body>
<div class="row">
  <div class="panel" style="background:var(--cream-100)">
    <img src="../assets/malgudi-logo.png" alt="Malgudi" />
    <span class="cap" style="color:var(--text-subtle)">on cream-100</span>
  </div>
  <div class="panel" style="background:var(--gradient-maroon)">
    <span class="lock" style="color:#FBF1F0">BlueJay Malgudi</span>
    <span class="cap" style="color:#EBBBB8">wordmark · on maroon</span>
  </div>
  <div class="panel" style="background:var(--maroon-950)">
    <img src="../assets/malgudi-logo.png" alt="Malgudi" />
    <span class="cap" style="color:#9C8084">on dark canvas</span>
  </div>
</div>
</body></html>
