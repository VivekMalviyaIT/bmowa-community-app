<!-- @dsCard group="Type" viewport="700x150" name="Labels & Mono" subtitle="Uppercase eyebrow labels + JetBrains Mono." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:24px; background:var(--bg-app); font-family:var(--font-sans); }
  .meta { font-family:var(--font-mono); font-size:10px; color:var(--text-subtle); margin:0 0 8px; }
  .eyebrow { font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:.14em; color:var(--text-subtle); }
  .mono { font-family:var(--font-mono); font-size:13px; color:var(--text-body); margin-top:18px; }
  .pill { display:inline-block; font-family:var(--font-mono); font-size:12px; background:var(--surface-sunk); border:1px solid var(--border-hairline); border-radius:8px; padding:3px 8px; color:var(--brand); }
</style></head>
<body>
<p class="meta">eyebrow · uppercase · 0.14em tracking</p>
<span class="eyebrow">Live Status · Community Journal</span>
<p class="mono">Ref ID <span class="pill">BMOWA-2406-A14</span> &nbsp; 80,000 L / 100 kL</p>
</body></html>
