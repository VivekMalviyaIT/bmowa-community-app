<!-- @dsCard group="Colors" viewport="700x150" name="Semantic — Status" subtitle="Success, warning, danger, info + soft fills." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:22px; background:var(--bg-app); font-family:var(--font-sans); }
  .row { display:flex; gap:14px; }
  .item { flex:1; }
  .solid { height:52px; border-radius:10px 10px 0 0; display:flex; align-items:center; padding:0 12px; color:#fff; font-size:12px; font-weight:600; }
  .soft { height:34px; border-radius:0 0 10px 10px; display:flex; align-items:center; padding:0 12px; font-size:11px; font-weight:500; }
</style></head>
<body>
<div class="row">
  <div class="item">
    <div class="solid" style="background:var(--success)">Success</div>
    <div class="soft" style="background:var(--success-soft);color:var(--success)">soft fill</div>
  </div>
  <div class="item">
    <div class="solid" style="background:var(--warning)">Warning</div>
    <div class="soft" style="background:var(--warning-soft);color:var(--warning)">soft fill</div>
  </div>
  <div class="item">
    <div class="solid" style="background:var(--danger)">Danger</div>
    <div class="soft" style="background:var(--danger-soft);color:var(--danger)">soft fill</div>
  </div>
  <div class="item">
    <div class="solid" style="background:var(--info)">Info</div>
    <div class="soft" style="background:var(--info-soft);color:var(--info)">soft fill</div>
  </div>
</div>
</body></html>
