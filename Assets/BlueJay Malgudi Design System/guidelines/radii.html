<!-- @dsCard group="Spacing" viewport="700x170" name="Radii" subtitle="Soft corners — sm to 2xl + pill." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:24px; background:var(--bg-app); font-family:var(--font-sans); }
  .row { display:flex; gap:16px; align-items:flex-end; }
  .item { text-align:center; }
  .box { width:80px; height:64px; background:var(--surface-card); border:1px solid var(--border-hairline); box-shadow:var(--shadow-sm); }
  .lab { font-size:10px; color:var(--text-muted); margin-top:8px; font-family:var(--font-mono); }
  .pill { width:120px; height:40px; border-radius:999px; }
</style></head>
<body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="lab">sm · 8</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="lab">md · 12</div></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><div class="lab">lg · 16</div></div>
  <div class="item"><div class="box" style="border-radius:24px"></div><div class="lab">xl · 24 ·card</div></div>
  <div class="item"><div class="box" style="border-radius:32px"></div><div class="lab">2xl · 32</div></div>
  <div class="item"><div class="box pill"></div><div class="lab">pill · 999</div></div>
</div>
</body></html>
