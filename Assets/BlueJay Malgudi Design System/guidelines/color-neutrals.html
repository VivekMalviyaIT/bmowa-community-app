<!-- @dsCard group="Colors" viewport="700x180" name="Neutrals — Cream & Ink" subtitle="Claude-inspired cream canvas + warm ink text." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:22px; background:var(--bg-app); font-family:var(--font-sans); }
  .lbl { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.12em; color:var(--text-subtle); margin:0 0 8px; }
  .scale { display:flex; gap:0; border-radius:12px; overflow:hidden; box-shadow:var(--shadow-sm); margin-bottom:16px; }
  .sw { flex:1; height:64px; display:flex; flex-direction:column; justify-content:flex-end; padding:7px 8px; }
  .n { font-size:10px; font-weight:600; }
  .h { font-size:9px; opacity:.75; font-family:var(--font-mono); }
</style></head>
<body>
<p class="lbl">Cream surfaces</p>
<div class="scale">
  <div class="sw" style="background:var(--cream-50);color:#2A2622;border-right:1px solid #eee"><span class="n">50</span><span class="h">#FCFBF7</span></div>
  <div class="sw" style="background:var(--cream-100);color:#2A2622"><span class="n">100 ·app</span><span class="h">#F7F4EC</span></div>
  <div class="sw" style="background:var(--cream-200);color:#2A2622"><span class="n">200</span><span class="h">#EFEADD</span></div>
  <div class="sw" style="background:var(--cream-300);color:#2A2622"><span class="n">300</span><span class="h">#E3DCCB</span></div>
  <div class="sw" style="background:var(--cream-400);color:#2A2622"><span class="n">400</span><span class="h">#CFC6B2</span></div>
</div>
<p class="lbl">Warm ink · text</p>
<div class="scale">
  <div class="sw" style="background:var(--ink-900);color:#FCFBF7"><span class="n">900 ·head</span><span class="h">#2A2622</span></div>
  <div class="sw" style="background:var(--ink-700);color:#FCFBF7"><span class="n">700 ·body</span><span class="h">#4A443D</span></div>
  <div class="sw" style="background:var(--ink-500);color:#FCFBF7"><span class="n">500 ·muted</span><span class="h">#756E64</span></div>
  <div class="sw" style="background:var(--ink-400);color:#FCFBF7"><span class="n">400 ·subtle</span><span class="h">#9B9488</span></div>
  <div class="sw" style="background:var(--ink-300);color:#2A2622"><span class="n">300 ·disabled</span><span class="h">#C2BBAE</span></div>
</div>
</body></html>
