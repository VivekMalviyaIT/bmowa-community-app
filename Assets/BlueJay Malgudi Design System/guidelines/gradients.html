<!-- @dsCard group="Colors" viewport="700x210" name="Gradients & Glow" subtitle="The modern, illuminated layer." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:22px; background:var(--bg-app); font-family:var(--font-sans); }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  .g { height:72px; border-radius:14px; display:flex; align-items:flex-end; padding:9px 11px; font-size:11px; font-weight:600; color:#fff; }
  .row2 { display:flex; gap:14px; margin-top:14px; align-items:center; }
  .chip { width:120px; height:54px; border-radius:14px; background:var(--surface-card); display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--text-muted); font-weight:600; }
</style></head>
<body>
<div class="grid">
  <div class="g" style="background:var(--gradient-maroon)">maroon</div>
  <div class="g" style="background:var(--gradient-sunset)">sunset</div>
  <div class="g" style="background:var(--gradient-garden)">garden</div>
  <div class="g" style="background:var(--gradient-dawn);color:var(--ink-700)">dawn</div>
  <div class="g" style="background:var(--gradient-dusk)">dusk</div>
  <div class="g" style="background:var(--surface-card);background-image:var(--gradient-illume);color:var(--ink-700)">illume (radial)</div>
</div>
<div class="row2">
  <div class="chip" style="box-shadow:var(--glow-maroon)">glow · maroon</div>
  <div class="chip" style="box-shadow:var(--glow-green)">glow · green</div>
  <div class="chip" style="box-shadow:var(--glow-sand)">glow · sand</div>
</div>
</body></html>
