<!-- @dsCard group="Colors" viewport="700x170" name="Tertiary — Sand & Clay" subtitle="Sunlight & earthen warmth." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:22px; background:var(--bg-app); font-family:var(--font-sans); }
  .scale { display:flex; gap:0; border-radius:14px; overflow:hidden; box-shadow:var(--shadow-sm); }
  .sw { flex:1; height:96px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px 9px; }
  .n { font-size:10px; font-weight:600; }
  .h { font-size:9px; opacity:.8; font-family:var(--font-mono); }
  .cap { margin-top:12px; font-size:12px; color:var(--text-muted); }
</style></head>
<body>
<div class="scale">
  <div class="sw" style="background:var(--sand-50);color:#75592F"><span class="n">50</span><span class="h">#FAF6EF</span></div>
  <div class="sw" style="background:var(--sand-100);color:#75592F"><span class="n">100</span><span class="h">#F3E9D6</span></div>
  <div class="sw" style="background:var(--sand-200);color:#574323"><span class="n">200</span><span class="h">#E8D5B4</span></div>
  <div class="sw" style="background:var(--sand-300);color:#574323"><span class="n">300</span><span class="h">#D8BC8C</span></div>
  <div class="sw" style="background:var(--sand-400);color:#3C2E18"><span class="n">400</span><span class="h">#C4A882</span></div>
  <div class="sw" style="background:var(--sand-500);color:#fff"><span class="n">500</span><span class="h">#B08E5E</span></div>
  <div class="sw" style="background:var(--sand-600);color:#fff"><span class="n">600</span><span class="h">#94733F</span></div>
  <div class="sw" style="background:var(--sand-700);color:#fff"><span class="n">700</span><span class="h">#75592F</span></div>
  <div class="sw" style="background:var(--sand-800);color:#E8D5B4"><span class="n">800</span><span class="h">#574323</span></div>
  <div class="sw" style="background:var(--sand-900);color:#E8D5B4"><span class="n">900</span><span class="h">#3C2E18</span></div>
</div>
<div class="cap">Sand warms cream surfaces and powers the dawn/sunset gradients.</div>
</body></html>
