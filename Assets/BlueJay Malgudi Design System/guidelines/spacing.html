<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px base — 1 through 20." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:24px; background:var(--bg-app); font-family:var(--font-sans); }
  .row { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
  .bar { background:var(--gradient-maroon); height:14px; border-radius:4px; }
  .lab { font-size:11px; color:var(--text-muted); width:120px; font-family:var(--font-mono); }
</style></head>
<body>
<div class="row"><span class="lab">--space-1 · 4</span><div class="bar" style="width:4px"></div></div>
<div class="row"><span class="lab">--space-2 · 8</span><div class="bar" style="width:8px"></div></div>
<div class="row"><span class="lab">--space-3 · 12</span><div class="bar" style="width:12px"></div></div>
<div class="row"><span class="lab">--space-4 · 16</span><div class="bar" style="width:16px"></div></div>
<div class="row"><span class="lab">--space-6 · 24</span><div class="bar" style="width:24px"></div></div>
<div class="row"><span class="lab">--space-8 · 32</span><div class="bar" style="width:32px"></div></div>
<div class="row"><span class="lab">--space-12 · 48</span><div class="bar" style="width:48px"></div></div>
<div class="row"><span class="lab">--space-16 · 64</span><div class="bar" style="width:64px"></div></div>
<div class="row"><span class="lab">--space-20 · 80</span><div class="bar" style="width:80px"></div></div>
</body></html>
