<!-- @dsCard group="Colors" viewport="700x170" name="Secondary — Garden Green" subtitle="The lush, leafy community. Secondary = 600." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:22px; background:var(--bg-app); font-family:var(--font-sans); }
  .scale { display:flex; gap:0; border-radius:14px; overflow:hidden; box-shadow:var(--shadow-sm); }
  .sw { flex:1; height:96px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px 9px; }
  .n { font-size:10px; font-weight:600; }
  .h { font-size:9px; opacity:.8; font-family:var(--font-mono); }
  .cap { margin-top:12px; font-size:12px; color:var(--text-muted); }
</style></head>
<body>
<div class="scale">
  <div class="sw" style="background:var(--green-50);color:#2F543E"><span class="n">50</span><span class="h">#F0F4F0</span></div>
  <div class="sw" style="background:var(--green-100);color:#2F543E"><span class="n">100</span><span class="h">#DCE7DD</span></div>
  <div class="sw" style="background:var(--green-200);color:#2F543E"><span class="n">200</span><span class="h">#BBD0BF</span></div>
  <div class="sw" style="background:var(--green-300);color:#1D3327"><span class="n">300</span><span class="h">#93B49B</span></div>
  <div class="sw" style="background:var(--green-400);color:#fff"><span class="n">400</span><span class="h">#6E977A</span></div>
  <div class="sw" style="background:var(--green-500);color:#fff"><span class="n">500</span><span class="h">#4F7A5C</span></div>
  <div class="sw" style="background:var(--green-600);color:#fff"><span class="n">600 ·2nd</span><span class="h">#3C6B4E</span></div>
  <div class="sw" style="background:var(--green-700);color:#fff"><span class="n">700</span><span class="h">#2F543E</span></div>
  <div class="sw" style="background:var(--green-800);color:#fff"><span class="n">800</span><span class="h">#264332</span></div>
  <div class="sw" style="background:var(--green-900);color:#BBD0BF"><span class="n">900</span><span class="h">#1D3327</span></div>
</div>
<div class="cap">Garden green carries greenery, nature and positive/success states.</div>
</body></html>
